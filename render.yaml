services:
  - type: web
    name: ankitji-pdf-tools
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 1 --timeout 180 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: UPLOAD_LIMIT_MB
        value: "50"
      - key: COMPRESS_LIMIT_MB
        value: "8"
      - key: COMPRESS_PAGE_LIMIT
        value: "10"
